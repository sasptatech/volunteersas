<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VolunteerSAS — PTA Cafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"><div class="section"><p style="color:var(--ink-soft)">Loading…</p></div></div>
<div id="ovl"></div>

<script type="module">
import { watchAuth, getProfile, isStoreAdmin } from "./js/auth.js";
import {
  db, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, where,
  serverTimestamp
} from "./js/firebase-init.js";
import {
  SHIFT_TYPES, SCHOOL_START, SCHOOL_END, isSchoolDay, mondayOf, weekDates, shiftWeek, fmtDayLabel, pad
} from "./js/cafe-dates.js";
import { toast, showOverlay, closeOverlay, esc, renderHeader } from "./js/common.js";
import { renderChatPanel } from "./js/chat.js";
import { renderAddToCalendar } from "./js/calendar.js";

const root = document.getElementById('root');
let cafeSignups = [], dayOverrides = {};
let view = 'week';
let weekStart = mondayOf(SCHOOL_START);
let month = SCHOOL_START.slice(0, 7);
const SCHOOL_MONTHS = (() => {
  const out = []; let [y, m] = SCHOOL_START.split('-').map(Number);
  const [ey, em] = SCHOOL_END.split('-').map(Number);
  while (y < ey || (y === ey && m <= em)) { out.push(y + '-' + pad(m)); m++; if (m > 12) { m = 1; y++; } }
  return out;
})();
function monthLabel(ym) { const [y, m] = ym.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }

watchAuth((profile, needsProfile) => {
  if (needsProfile) { location.href = 'index.html'; return; }
  renderHeader('cafe.html');
  watchData();
}, () => { location.href = 'index.html'; });

function watchData() {
  onSnapshot(collection(db, 'cafeSignups'), snap => { cafeSignups = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
  onSnapshot(collection(db, 'cafeDayOverrides'), snap => {
    dayOverrides = {}; snap.docs.forEach(d => { dayOverrides[d.id] = d.data().status; });
    render();
  });
}

function signupsFor(date, shift) { return cafeSignups.filter(s => s.date === date && s.shift === shift); }
function extraSlotsFor(date) { return cafeSignups.filter(s => s.date === date && s.overflow); }
function mySignup(date, shift) { return cafeSignups.find(s => s.date === date && s.shift === shift && s.uid === getProfile().uid); }

function render() {
  const storeAdmin = isStoreAdmin();
  root.innerHTML = `<div class="section">
    <h1 class="serif" style="font-size:22px">☕ Cafe Volunteer</h1>
    <div class="card" style="padding:14px;margin-bottom:16px"><a href="menu.html" class="small-link">🍽️ View this term's PTA Cafe menu →</a></div>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;gap:6px">
        <button class="btn ${view === 'week' ? 'btn-primary' : 'btn-ghost'}" id="weekViewBtn">Week view</button>
        <button class="btn ${view === 'month' ? 'btn-primary' : 'btn-ghost'}" id="monthViewBtn">Month overview</button>
      </div>
      <select id="monthJump" style="padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;font-weight:600">
        ${SCHOOL_MONTHS.map(ym => `<option value="${ym}" ${(view === 'month' ? month : weekStart.slice(0, 7)) === ym ? 'selected' : ''}>${monthLabel(ym)}</option>`).join('')}
      </select>
    </div>

    <div id="cafeBody"></div>

    ${storeAdmin ? `<div class="card" style="padding:18px;margin-top:18px;border-left:4px solid var(--navy)">
      <h3 style="margin-top:0">Store Admin tools</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" id="openDayBtn">Open store on a specific day</button>
        <button class="btn btn-ghost" id="closeDayBtn">Close store on a specific day</button>
        <button class="btn btn-ghost" id="extraSlotBtn">Add extra slot with message</button>
      </div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:10px">To update the menu, go to the <a href="menu.html" class="small-link">PTA Cafe</a> page.</div>
    </div>` : ''}

    <div class="card" style="padding:18px;margin-top:18px">
      <h3 style="margin-top:0">💬 Cafe chat</h3>
      <div id="cafeChat"></div>
    </div>
  </div>`;

  document.getElementById('weekViewBtn').onclick = () => { view = 'week'; render(); };
  document.getElementById('monthViewBtn').onclick = () => { view = 'month'; render(); };
  document.getElementById('monthJump').onchange = (e) => {
    if (view === 'month') month = e.target.value; else weekStart = mondayOf(e.target.value + '-01');
    render();
  };
  renderChatPanel('cafeChat', 'cafe', 'main', { canModerate: storeAdmin });

  if (storeAdmin) {
    document.getElementById('openDayBtn').onclick = () => promptDayOverride('open');
    document.getElementById('closeDayBtn').onclick = () => promptDayOverride('closed');
    document.getElementById('extraSlotBtn').onclick = () => promptExtraSlot();
  }

  const bodyEl = document.getElementById('cafeBody');
  bodyEl.innerHTML = view === 'month' ? renderMonthGrid() : renderWeek();
  wireBodyHandlers(storeAdmin);
}

function renderWeek() {
  const dates = weekDates(weekStart);
  const label = `${fmtDayLabel(dates[0])} – ${fmtDayLabel(dates[4])}`;
  const atStart = weekStart <= mondayOf(SCHOOL_START), atEnd = weekStart >= mondayOf(SCHOOL_END);
  let out = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button class="btn btn-ghost" ${atStart ? 'disabled' : ''} id="prevWeek">‹ Prev week</button>
    <div style="font-weight:700;font-family:'Source Serif 4',serif">${label}</div>
    <button class="btn btn-ghost" ${atEnd ? 'disabled' : ''} id="nextWeek">Next week ›</button>
  </div><div class="grid">`;
  dates.forEach(date => {
    const dayLabel = fmtDayLabel(date);
    if (!isSchoolDay(date, dayOverrides)) {
      out += `<div class="card" style="padding:14px;opacity:.6"><div style="font-weight:700;margin-bottom:4px">${dayLabel}</div><div style="font-size:12.5px;color:var(--ink-soft)">Store closed</div></div>`;
      return;
    }
    out += `<div class="card" style="padding:14px">
      <div style="font-weight:700;margin-bottom:10px">☕ ${dayLabel}</div>
      ${SHIFT_TYPES.map(st => shiftBlock(date, st)).join('<div style="height:10px"></div>')}
      ${extraSlotsBlock(date)}
    </div>`;
  });
  out += `</div>`;
  return out;
}

function shiftBlock(date, st) {
  const signups = signupsFor(date, st.id);
  const spotsLeft = 2 - signups.length;
  const mine = mySignup(date, st.id);
  let rows = signups.map(s => `<div style="font-size:12.5px;padding:4px 0;display:flex;justify-content:space-between">
      <span><strong>${esc(s.name)}</strong>${s.comment ? ` — <span style="color:var(--ink-soft)">${esc(s.comment)}</span>` : ''}</span>
      ${s.uid === getProfile().uid ? `<button class="small-link" style="color:var(--red)" onclick="window.__removeCafe('${s.id}')">Remove</button>` : ''}
    </div>`).join('');
  for (let i = 0; i < spotsLeft; i++) rows += `<div style="font-size:12.5px;padding:4px 0;color:var(--ink-soft)">Open slot — <button class="small-link" onclick="window.__openCafeSignup('${date}','${st.id}',false)">Sign up</button></div>`;
  return `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:600;font-size:13.5px">${st.label}</span>
      <span class="chip" style="background:${spotsLeft <= 0 ? '#E3F3EC' : '#FDF1D8'};color:${spotsLeft <= 0 ? '#0E8A6D' : '#96721E'}">${spotsLeft <= 0 ? 'Full' : spotsLeft + ' open'}</span>
    </div>
    <div style="margin-top:6px">${rows}</div>
  </div>`;
}

function extraSlotsBlock(date) {
  const extras = extraSlotsFor(date);
  if (!extras.length) return '';
  return `<div style="margin-top:10px;border-top:1px dashed var(--line);padding-top:8px">
    ${extras.map(s => `<div style="font-size:12.5px;padding:4px 0;color:var(--gold)">
      ➕ ${esc(s.message || 'Extra help needed')} — ${s.uid ? `<strong>${esc(s.name)}</strong>` : `<button class="small-link" onclick="window.__signupExtra('${s.id}')">Sign up</button>`}
    </div>`).join('')}
  </div>`;
}

function renderMonthGrid() {
  const [y, m] = month.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  let mon = new Date(first); mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const rows = [];
  for (let w = 0; w < 6; w++) {
    const rowDates = [];
    for (let i = 0; i < 5; i++) { const d = new Date(mon); d.setDate(d.getDate() + w * 7 + i); rowDates.push(d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())); }
    if (rowDates.every(dt => dt.slice(0, 7) !== month)) continue;
    rows.push(rowDates);
  }
  const legend = `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--ink-soft)">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#0E8A6D;margin-right:5px"></span>Fully staffed</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#C9922B;margin-right:5px"></span>Over half filled</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#E24B4A;margin-right:5px"></span>Needs volunteers</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#EAE7E0;margin-right:5px"></span>No school</span>
  </div>`;
  const head = `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px">${['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].map(d => `<div style="font-size:11px;font-weight:700;text-align:center;color:var(--ink-soft)">${d}</div>`).join('')}</div>`;
  const grid = rows.map(rowDates => `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px">
    ${rowDates.map(dt => {
      const inMonth = dt.slice(0, 7) === month;
      const school = isSchoolDay(dt, dayOverrides);
      let bg = '#EAE7E0', fg = '#8A8880', filled = 0;
      if (school) {
        filled = ['am', 'pm'].reduce((s, sh) => s + signupsFor(dt, sh).length, 0);
        const r = filled / 4;
        bg = r >= 1 ? '#0E8A6D' : r >= 0.5 ? '#C9922B' : '#E24B4A'; fg = '#fff';
      }
      const dayNum = +dt.slice(8, 10);
      return `<div onclick="${school ? `window.__jumpToWeek('${dt}')` : ''}" style="min-height:56px;border-radius:8px;padding:6px;background:${bg};opacity:${inMonth ? 1 : .3};cursor:${school ? 'pointer' : 'default'}">
        <div style="font-size:11px;font-weight:700;color:${fg}">${dayNum}</div>
        ${school ? `<div style="font-size:9.5px;color:${fg};margin-top:2px">${filled}/4 filled</div>` : ''}
      </div>`;
    }).join('')}
  </div>`).join('');
  return legend + head + grid;
}

function wireBodyHandlers(storeAdmin) {
  const prev = document.getElementById('prevWeek'); if (prev) prev.onclick = () => { weekStart = shiftWeek(weekStart, -1); render(); };
  const next = document.getElementById('nextWeek'); if (next) next.onclick = () => { weekStart = shiftWeek(weekStart, 1); render(); };

  window.__jumpToWeek = (date) => { weekStart = mondayOf(date); view = 'week'; render(); };

  window.__openCafeSignup = (date, shift) => {
    const st = SHIFT_TYPES.find(s => s.id === shift);
    showOverlay(`<div class="modal" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Sign up for this shift</h2>
      <p style="font-size:13.5px;color:var(--ink-soft)">${esc(fmtDayLabel(date))} · ${st.label}</p>
      <div class="form-row"><label>Comment (optional — visible to other volunteers)</label><textarea id="cafeComment" rows="2" placeholder="e.g. I can only stay till 11:30am"></textarea></div>
      <button class="btn btn-primary" style="width:100%" id="confirmCafeSignup">Confirm sign-up</button>
    </div>`);
    document.getElementById('confirmCafeSignup').onclick = async () => {
      const comment = document.getElementById('cafeComment').value.trim();
      if (signupsFor(date, shift).length >= 2) { toast('Both spots just filled.'); return; }
      try {
        const hoursRef = await addDoc(collection(db, 'hours'), {
          uid: getProfile().uid, volunteer: getProfile().displayName, event: 'PTA Cafe — ' + st.label,
          eco: 'cafe', date, hrs: st.hrs, createdAt: serverTimestamp(),
        });
        await addDoc(collection(db, 'cafeSignups'), {
          date, shift, uid: getProfile().uid, name: getProfile().displayName, comment, overflow: false, hoursId: hoursRef.id, createdAt: serverTimestamp(),
        });
        showOverlay(`<div class="modal" style="position:relative">
          <button class="close-x" onclick="closeOverlay()">✕</button>
          <h2>Shift confirmed! 🎉</h2>
          <p style="font-size:13.5px;color:var(--ink-soft)">${esc(fmtDayLabel(date))} · ${st.label}</p>
          <div id="addCalCafe"></div>
          <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="closeOverlay()">Done</button>
        </div>`);
        renderAddToCalendar('addCalCafe', {
          title: 'PTA Cafe — ' + st.label, date, startTime: st.label.split('–')[0].trim(),
          durationHrs: st.hrs, location: 'PTA Cafe, SAS', description: 'PTA Cafe volunteer shift.',
        });
      } catch (e) { toast('Could not sign up: ' + e.message); }
    };
  };

  window.__signupExtra = async (slotId) => {
    try {
      await updateDoc(doc(db, 'cafeSignups', slotId), { uid: getProfile().uid, name: getProfile().displayName });
      toast('Signed up to help!');
    } catch (e) { toast('Could not sign up: ' + e.message); }
  };

  window.__removeCafe = async (id) => {
    const s = cafeSignups.find(x => x.id === id); if (!s) return;
    try {
      await deleteDoc(doc(db, 'cafeSignups', id));
      if (s.hoursId) { await deleteDoc(doc(db, 'hours', s.hoursId)).catch(() => {}); }
      toast('Shift removed.');
    } catch (e) { toast('Could not remove: ' + e.message); }
  };
}

function promptDayOverride(status) {
  showOverlay(`<div class="modal" style="position:relative">
    <button class="close-x" onclick="closeOverlay()">✕</button>
    <h2>${status === 'open' ? 'Open store on a day' : 'Close store on a day'}</h2>
    <div class="form-row"><label>Date</label><input type="date" id="ovrDate"></div>
    <button class="btn btn-primary" style="width:100%" id="ovrSave">Save</button>
  </div>`);
  document.getElementById('ovrSave').onclick = async () => {
    const date = document.getElementById('ovrDate').value;
    if (!date) return;
    try {
      const { setDoc } = await import("./js/firebase-init.js");
      await setDoc(doc(db, 'cafeDayOverrides', date), { status });
      closeOverlay(); toast('Saved.');
    } catch (e) { toast('Could not save: ' + e.message); }
  };
}

function promptExtraSlot() {
  showOverlay(`<div class="modal" style="position:relative">
    <button class="close-x" onclick="closeOverlay()">✕</button>
    <h2>Add extra slot</h2>
    <div class="form-row"><label>Date</label><input type="date" id="exDate"></div>
    <div class="form-row"><label>Message shown to volunteers</label><input id="exMsg" placeholder="e.g. Help with labeling new merchandise"></div>
    <button class="btn btn-primary" style="width:100%" id="exSave">Add slot</button>
  </div>`);
  document.getElementById('exSave').onclick = async () => {
    const date = document.getElementById('exDate').value;
    const message = document.getElementById('exMsg').value.trim();
    if (!date || !message) { toast('Please fill in both fields.'); return; }
    try {
      await addDoc(collection(db, 'cafeSignups'), { date, shift: 'extra', overflow: true, message, uid: null, name: null, createdAt: serverTimestamp() });
      closeOverlay(); toast('Extra slot added.');
    } catch (e) { toast('Could not add: ' + e.message); }
  };
}
</script>
</body>
</html>

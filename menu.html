<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VolunteerSAS — PTA Cafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"><div class="section"><p style="color:var(--ink-soft)">Loading…</p></div></div>

<script type="module">
import { watchAuth, isStoreAdmin } from "./js/auth.js";
import { db, doc, onSnapshot } from "./js/firebase-init.js";
import { renderHeader, esc } from "./js/common.js";

const root = document.getElementById('root');

watchAuth((profile, needsProfile) => {
  if (needsProfile) { location.href = 'index.html'; return; }
  renderHeader('menu.html');
  // Store Admins manage these files on the Admin -> Cafe volunteers tab.
  onSnapshot(doc(db, 'settings', 'cafeMenu'), snap => {
    render(snap.exists() ? (snap.data().items || []) : []);
  }, () => render([]));
}, () => { location.href = 'index.html'; });

function render(items) {
  if (!items.length) {
    root.innerHTML = `<div class="section" style="max-width:560px;margin:0 auto;text-align:center;padding-top:60px">
      <div style="font-size:44px;margin-bottom:10px">🍽️</div>
      <h1 class="serif" style="font-size:22px">PTA Cafe</h1>
      <p style="color:var(--ink-soft);font-size:14px">Menu coming soon.</p>
      ${isStoreAdmin() ? `<p style="font-size:13px"><a class="small-link" href="admin.html">Upload a menu in Admin → Cafe volunteers</a></p>` : ''}
    </div>`;
    return;
  }
  root.innerHTML = `<div class="section" style="max-width:820px;margin:0 auto">
    <h1 class="serif" style="font-size:22px">🍽️ PTA Cafe</h1>
    ${isStoreAdmin() ? `<p style="font-size:12.5px;color:var(--ink-soft)">
      <a class="small-link" href="admin.html">Manage these menus in Admin → Cafe volunteers</a></p>` : ''}
    ${items.map(m => `
      <div class="card" style="padding:16px;margin-top:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
          <h3 style="margin:0;font-size:16px">${esc(m.name)}</h3>
          <a class="small-link" href="${esc(m.url)}" target="_blank" rel="noopener">Open in new tab ↗</a>
        </div>
        ${m.type === 'pdf'
          ? `<object data="${esc(m.url)}" type="application/pdf" style="width:100%;height:70vh;min-height:420px;border:1px solid var(--line);border-radius:10px">
               <p style="font-size:13.5px;color:var(--ink-soft);padding:12px">
                 Your browser can't display PDFs inline —
                 <a class="small-link" href="${esc(m.url)}" target="_blank" rel="noopener">open the menu here</a>.
               </p>
             </object>`
          : `<img src="${esc(m.url)}" alt="${esc(m.name)}" style="max-width:100%;border-radius:10px;display:block">`}
      </div>`).join('')}
  </div>`;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VolunteerSAS — PTA Cafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"><div class="section"><p style="color:var(--ink-soft)">Loading…</p></div></div>

<script type="module">
import { watchAuth } from "./js/auth.js";
import { renderHeader } from "./js/common.js";

const root = document.getElementById('root');

watchAuth((profile, needsProfile) => {
  if (needsProfile) { location.href = 'index.html'; return; }
  renderHeader('menu.html');
  root.innerHTML = `<div class="section" style="max-width:560px;margin:0 auto;text-align:center;padding-top:60px">
    <div style="font-size:44px;margin-bottom:10px">🍽️</div>
    <h1 class="serif" style="font-size:22px">PTA Cafe</h1>
    <p style="color:var(--ink-soft);font-size:14px">Menu coming soon.</p>
  </div>`;
}, () => { location.href = 'index.html'; });
</script>
</body>
</html>

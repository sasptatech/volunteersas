<script type="module">
import { watchAuth, getProfile, isSuperadmin, isAdmin, isStoreAdmin, isAnyAdminTier, ECOSYSTEMS } from "./js/auth.js";
import {
  db, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, getDoc, setDoc, onSnapshot,
  serverTimestamp, query, where, orderBy, limit, storageRef, uploadBytes, getDownloadURL, deleteObject, arrayUnion
} from "./js/firebase-init.js";
import { toast, showOverlay, closeOverlay, esc, renderHeader } from "./js/common.js";

import { MAPPEDIN_LOCATIONS, findMappedinLocation } from "./js/mappedin-locations.js";
import {

} from "./js/cafe-dates.js";
import { queueEmails } from "./js/email.js";

const root = document.getElementById('root');
let tab = 'events';
let memberSortField = 'name';
let memberSortDir = 'asc';
let events = [], users = {}, hours = [], auditLog = [], sentMail = [];

// ---- Cafe volunteers tab state ----
let cafeSignups = [], cafeOverrides = {}, cafeDayCaps = {};
let cafeRange = 'week';                 // 'day' | 'week' | 'month'
let cafeAnchor = dstr(new Date());      // any date inside the shown range
let cafeSortField = 'date';             // 'date' | 'name' | 'empty'
let cafeSortDir = 'asc';
let cafeShowEmpty = true;               // show unfilled seats as their own rows
// Selection is per SEAT (keyed by cafeSignups doc id) so you can export specific
// shifts. Email dedupes down to unique people at send time instead.
let cafeSelected = new Set();
let cafeMenu = { items: [] };           // settings/cafeMenu -> { items: [...] }

watchAuth((profile, needsProfile) => {
  if (needsProfile) { location.href = 'index.html'; return; }
  if (!isAnyAdminTier()) { root.innerHTML = `<div class="section"><p>You don't have admin access.</p></div>`; return; }
  renderHeader();
  watchData();
}, () => { location.href = 'index.html'; });

function watchData() {
  onSnapshot(collection(db, 'events'), snap => { events = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
  onSnapshot(collection(db, 'users'), snap => {
    users = {}; snap.docs.forEach(d => { users[d.id] = { uid: d.id, ...d.data() }; }); render();
  });
  if (isAnyAdminTier()) onSnapshot(collection(db, 'hours'), snap => { hours = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
  if (isSuperadmin()) onSnapshot(collection(db, 'auditLog'), snap => { auditLog = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
  // Sent email history. Capped because one send writes one doc per recipient.
  if (isAnyAdminTier()) {
    onSnapshot(query(collection(db, 'mail'), orderBy('createdAt', 'desc'), limit(800)), snap => {
      sentMail = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
    }, () => { /* rules not published yet — leave the tab empty rather than break */ });
  }
  if (isStoreAdmin()) {
    onSnapshot(collection(db, 'cafeSignups'), snap => { cafeSignups = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
    onSnapshot(collection(db, 'cafeDayOverrides'), snap => {
      cafeOverrides = {}; cafeDayCaps = {};
      snap.docs.forEach(d => { const data = d.data(); cafeOverrides[d.id] = data.status; if (data.caps) cafeDayCaps[d.id] = data.caps; });
      render();
    });
    onSnapshot(doc(db, 'settings', 'cafeMenu'), snap => {
      cafeMenu = snap.exists() ? { items: snap.data().items || [] } : { items: [] };
      render();
    });
  }
}

async function logAudit(action, detail) {
  try { await addDoc(collection(db, 'auditLog'), { actorUid: getProfile().uid, actor: getProfile().displayName, action, detail, createdAt: serverTimestamp() }); }
  catch (e) { /* non-fatal */ }
}

function render() {
  const tabs = [['events', '📅 Events'], ['hours', '⏱ Hours']];
  if (isStoreAdmin()) tabs.push(['cafe', '☕ Cafe volunteers']);
  if (isAnyAdminTier()) tabs.push(['sent', '✉️ Sent email']);
  if (isAnyAdminTier()) tabs.push(['members', '👥 Members']);
  if (isSuperadmin()) tabs.push(['audit', '🗒 Audit log']);

  root.innerHTML = `<div class="section">
    <h1 class="serif" style="font-size:22px">Admin</h1>
    <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap">
      ${tabs.map(([id, label]) => `<button class="btn ${tab === id ? 'btn-primary' : 'btn-ghost'}" data-tab="${id}">${label}</button>`).join('')}
    </div>
    <div id="tabBody"></div>
  </div>`;
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { tab = b.dataset.tab; render(); });

  const body = document.getElementById('tabBody');
  if (tab === 'events') body.innerHTML = renderEventsTab();
  else if (tab === 'hours') body.innerHTML = renderHoursTab();
  else if (tab === 'cafe' && isStoreAdmin()) body.innerHTML = renderCafeTab();
  else if (tab === 'sent' && isAnyAdminTier()) body.innerHTML = renderSentTab();
  else if (tab === 'members' && isAnyAdminTier()) body.innerHTML = renderMembersTab();
  else if (tab === 'audit' && isSuperadmin()) body.innerHTML = renderAuditTab();
  wireTabHandlers();
}

function renderEventsTab() {
  const mine = isSuperadmin() ? events : events.filter(e => (e.adminUids || []).includes(getProfile().uid));
  return `
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn btn-primary" id="newEventBtn">+ Create event</button>
    </div>
    <div class="grid">${mine.map(e => `
      <div class="card" style="padding:14px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft)">${(e.divisions || []).join(', ')}</div>
        <h3 style="margin:4px 0 6px;font-size:15.5px">${esc(e.title || 'Untitled')}</h3>
        <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px">📅 ${esc(e.date || '')} · 📍 ${esc(e.location || '')}</div>
        <a class="small-link" href="event.html?id=${e.id}">Open event page →</a>
        <div style="margin-top:8px"><button class="small-link" style="color:var(--red)" onclick="window.__deleteEvent('${e.id}')">Delete event</button></div>
      </div>`).join('') || `<p style="color:var(--ink-soft)">No events yet.</p>`}</div>`;
}

function renderHoursTab() {
  const rows = hours.slice().sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
  return `<div class="card" style="padding:6px 16px;overflow-x:auto">
    <table class="datatable"><thead><tr><th>Volunteer</th><th>Activity</th><th>Date</th><th>Hours</th><th></th></tr></thead>
    <tbody>${rows.map(h => `<tr><td>${esc(h.volunteer)}</td><td>${esc(h.event)}</td><td>${esc(h.date)}</td><td>${h.hrs}</td>
        <td><button class="small-link" style="color:var(--red)" onclick="window.__removeHours('${h.id}')">Remove (no-show)</button></td></tr>`).join('') || `<tr><td colspan="5" style="color:var(--ink-soft)">No hours logged yet.</td></tr>`}</tbody></table>
  </div>`;
}

// ---------- Cafe volunteers ----------
// One row per SEAT (filled or empty). Modelling it this way is what lets the same
// list be sorted by date, by volunteer name, or by what's still unfilled.

function cafeRangeDates() {
  if (cafeRange === 'day') return [cafeAnchor];
  if (cafeRange === 'week') return weekDates(mondayOf(cafeAnchor));
  const [y, m] = cafeAnchor.split('-').map(Number);
  const out = []; const d = new Date(y, m - 1, 1);
  while (d.getMonth() === m - 1) { out.push(dstr(d)); d.setDate(d.getDate() + 1); }
  return out;
}

function cafeRangeLabel() {
  if (cafeRange === 'day') return fmtDayLabel(cafeAnchor);
  if (cafeRange === 'week') { const w = weekDates(mondayOf(cafeAnchor)); return `${fmtDayLabel(w[0])} → ${fmtDayLabel(w[4])}`; }
  const [y, m] = cafeAnchor.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function cafeSeatRow(date, shiftLabel, timeLabel, startMin, signup, fallbackNote) {
  const claimed = !!(signup && signup.uid);
  const u = claimed ? users[signup.uid] : null;
  return {
    date, shiftLabel, timeLabel, startMin,
    id: claimed ? signup.id : null,   // cafeSignups doc id — the selection key
    uid: claimed ? signup.uid : null,
    name: claimed ? (signup.name || (u && u.displayName) || 'Unknown') : '',
    email: u ? (u.email || '') : '',
    optOut: !!(u && u.emailOptOut),
    comment: (signup && signup.comment) || fallbackNote || '',
    isEmpty: !claimed,
  };
}

function cafeSeatRows() {
  const rows = [];
  cafeRangeDates().forEach(date => {
    if (!isSchoolDay(date, cafeOverrides)) return;
    SHIFT_TYPES.forEach(st => {
      const taken = cafeSignups.filter(s => s.date === date && s.shift === st.id && !s.overflow);
      const time = `${st.startTime}–${st.endTime}`;
      const mins = timeToMinutes(st.startTime);
      const cap = shiftCapacity(cafeDayCaps, date, st.id);
      taken.forEach(s => rows.push(cafeSeatRow(date, st.label, time, mins, s)));
      // Only show empty seats up to the (possibly reduced) capacity; a closed
      // shift (cap 0) contributes no empty rows.
      for (let i = taken.length; i < cap; i++) rows.push(cafeSeatRow(date, st.label, time, mins, null));
    });
    // Each extra-slot doc is its own seat; uid stays null until someone claims it.
    cafeSignups.filter(s => s.date === date && s.overflow).forEach(s => {
      rows.push(cafeSeatRow(date, 'Extra slot', `${s.startTime || '?'}–${s.endTime || '?'}`, timeToMinutes(s.startTime), s, s.message));
    });
  });
  return rows;
}

function cafeVisibleRows() {
  let rows = cafeSeatRows();
  if (!cafeShowEmpty) rows = rows.filter(r => !r.isEmpty);
  const dir = cafeSortDir === 'asc' ? 1 : -1;
  const byDate = (a, b) => a.date.localeCompare(b.date) || a.startMin - b.startMin;
  rows.sort((a, b) => {
    if (cafeSortField === 'name') {
      // Empty seats always sink to the bottom, so the roster stays readable either way.
      if (a.isEmpty !== b.isEmpty) return a.isEmpty ? 1 : -1;
      return ((a.name || '').localeCompare(b.name || '') || byDate(a, b)) * dir;
    }
    if (cafeSortField === 'empty') {
      if (a.isEmpty !== b.isEmpty) return (a.isEmpty ? -1 : 1) * dir;
      return byDate(a, b);
    }
    return byDate(a, b) * dir;
  });
  return rows;
}

function cafeSortArrow(field) { return cafeSortField === field ? (cafeSortDir === 'asc' ? ' ▲' : ' ▼') : ''; }

    <div class="card" style="padding:14px;margin-bottom:14px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        ${['day', 'week', 'month'].map(r => `<button class="btn ${cafeRange === r ? 'btn-primary' : 'btn-ghost'}" onclick="window.__cafeRange('${r}')">${r[0].toUpperCase() + r.slice(1)}</button>`).join('')}
        <button class="btn btn-ghost" onclick="window.__cafeNav(-1)">←</button>

      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;gap:6px;align-items:center;font-size:12.5px;font-weight:600">

    <div class="card" style="padding:6px 16px;overflow-x:auto">

          ? '<span class="chip" style="background:#FDF1D8;color:#96721E">Open</span>'
          : '<span class="chip" style="background:#E3F3EC;color:#0E8A6D">Filled</span>'}</td>

function cafeCsv(rows) {
  const q = v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
  const lines = [['Date', 'Day', 'Shift', 'Time', 'Volunteer', 'Email', 'Comment', 'Status'].map(q).join(',')];
  rows.forEach(r => lines.push([
    r.date,
    new Date(r.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' }),
    r.shiftLabel, r.timeLabel,
    r.isEmpty ? '' : r.name,
    r.isEmpty ? '' : r.email,
    r.comment,
    r.isEmpty ? 'Open' : 'Filled',
  ].map(q).join(',')));
  return lines.join('\r\n');
}

function roleRank(u) {
  if (u.isSuperadmin) return 3;
  if (u.isAdmin) return 2;
  if (u.isStoreAdmin) return 1;
  return 0;
}
function sortArrow(field) { return memberSortField === field ? (memberSortDir === 'asc' ? ' ▲' : ' ▼') : ''; }

function renderMembersTab() {
  const iAmSuperadmin = isSuperadmin();
  let all = Object.values(users);
  all.sort((a, b) => {
    const cmp = memberSortField === 'name'
      ? (a.displayName || '').localeCompare(b.displayName || '')
      : roleRank(a) - roleRank(b);
    return memberSortDir === 'asc' ? cmp : -cmp;
  });
  return `<div class="card" style="padding:6px 16px;overflow-x:auto">
    <table class="datatable"><thead><tr>
      <th><button class="small-link" onclick="window.__sortMembers('name')">Name${sortArrow('name')}</button></th>
      <th>Email</th><th>Phone</th>
      <th><button class="small-link" onclick="window.__sortMembers('role')">Roles${sortArrow('role')}</button></th>
      ${iAmSuperadmin ? '<th>Admin actions</th><th>Directory</th>' : ''}
    </tr></thead>
    <tbody>${all.map(u => `<tr>
        <td>${esc(u.anonymous ? 'Anonymous' : u.displayName)}</td><td>${esc(u.email)}</td><td>${esc(u.phone || '')}</td>
        <td>${u.isSuperadmin ? '⭐ Superadmin 🛡️ Admin ☕ Store Admin' : `${u.isAdmin ? '🛡️ Admin ' : ''}${u.isStoreAdmin ? '☕ Store Admin' : ''}`}</td>
        ${iAmSuperadmin ? `
        <td style="white-space:nowrap">
          ${u.uid !== getProfile().uid && !u.isSuperadmin ? `
            <button class="small-link" onclick="window.__toggleFlag('${u.uid}','isAdmin',${!u.isAdmin})">${u.isAdmin ? 'Revoke Admin' : 'Make Admin'}</button>
            <button class="small-link" onclick="window.__toggleFlag('${u.uid}','isStoreAdmin',${!u.isStoreAdmin})">${u.isStoreAdmin ? 'Revoke Store Admin' : 'Make Store Admin'}</button>
          ` : '<span style="font-size:11.5px;color:var(--ink-soft)">—</span>'}
        </td>
        <td>
          ${u.uid !== getProfile().uid ? `<button class="small-link" style="color:var(--red)" onclick="window.__removeMember('${u.uid}')">Delete from directory</button>` : '<span style="font-size:11.5px;color:var(--ink-soft)">You</span>'}
        </td>` : ''}
      </tr>`).join('') || `<tr><td colspan="${iAmSuperadmin ? 6 : 4}">No members yet.</td></tr>`}</tbody></table>
  </div>`;
}

// One send writes one doc per recipient, so collapse them back by batchId.
// Older single-doc sends have no batchId — those stand alone under their own id.
function sentBatches() {
  const groups = new Map();
  sentMail.forEach(m => {
    const key = m.batchId || m.id;
    if (!groups.has(key)) {
      groups.set(key, {
        key, subject: m.subject || (m.message && m.message.subject) || '(no subject)',
        scope: m.scope || '—', sentByName: m.sentByName || 'Unknown',
        createdAt: m.createdAt, replyTo: m.replyTo || '',
        body: (m.message && m.message.text) || '',
        recipients: [], sent: 0, failed: 0, pending: 0,
      });
    }
    const g = groups.get(key);
    (m.to || m.bcc || []).forEach(a => g.recipients.push(a));
    const state = m.delivery && m.delivery.state;
    if (state === 'SUCCESS') g.sent++;
    else if (state === 'ERROR') g.failed++;
    else g.pending++;
    if (!g.createdAt && m.createdAt) g.createdAt = m.createdAt;
  });
  return [...groups.values()].sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
}

function renderSentTab() {
  const batches = sentBatches();
  return `<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:12px">
      Every email the system has sent. One row per send, however many people it went to.
      Records can't be edited or deleted, so this is a reliable history.
    </div>
    <div class="card" style="padding:6px 16px;overflow-x:auto">
    <table class="datatable"><thead><tr>
      <th>When</th><th>Sent by</th><th>Subject</th><th>From</th><th>Recipients</th><th>Delivery</th><th></th>
    </tr></thead>
    <tbody>${batches.map(b => `<tr>
      <td style="white-space:nowrap">${b.createdAt?.seconds ? esc(new Date(b.createdAt.seconds * 1000).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })) : '—'}</td>
      <td>${esc(b.sentByName)}</td>
      <td>${esc(b.subject)}</td>
      <td>${b.scope === 'cafe' ? '☕ Cafe' : b.scope === 'event' ? '📅 Event' : '—'}</td>
      <td>${b.recipients.length}</td>
      <td style="white-space:nowrap">
        ${b.sent ? `<span class="chip" style="background:#E3F3EC;color:#0E8A6D">${b.sent} sent</span> ` : ''}
        ${b.pending ? `<span class="chip" style="background:#FDF1D8;color:#96721E">${b.pending} pending</span> ` : ''}
        ${b.failed ? `<span class="chip" style="background:#FBE4E6;color:#B01C2E">${b.failed} failed</span>` : ''}
      </td>
      <td><button class="small-link" onclick="window.__viewSent('${b.key}')">View</button></td>
    </tr>`).join('') || `<tr><td colspan="7" style="color:var(--ink-soft)">No email sent yet.</td></tr>`}</tbody></table>
  </div>`;
}

function renderAuditTab() {
  const rows = auditLog.slice().sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).slice(0, 100);
  return `<div class="card" style="padding:6px 16px;overflow-x:auto">
    <table class="datatable"><thead><tr><th>Who</th><th>Action</th><th>Detail</th></tr></thead>
    <tbody>${rows.map(a => `<tr><td>${esc(a.actor)}</td><td>${esc(a.action)}</td><td>${esc(a.detail || '')}</td></tr>`).join('') || `<tr><td colspan="3" style="color:var(--ink-soft)">No activity logged yet.</td></tr>`}</tbody></table>
  </div>`;
}

function renderTypeExtra(type) {
  const el = document.getElementById('neTypeExtra');
  if (!el) return;
  if (type === 'volunteer_slots') {
    el.innerHTML = `<div class="form-row"><label>Volunteer slot groups</label>
      <div id="slotGroupRows"></div>
      <button type="button" class="btn btn-ghost" id="addSlotGroupBtn" style="margin-top:6px">+ Add slot group</button>
    </div>`;
    document.getElementById('addSlotGroupBtn').onclick = () => addSlotGroupRow();
    addSlotGroupRow();
  } else if (type === 'item_signup') {
    el.innerHTML = `<div class="form-row"><label>Item categories needed</label>
      <div id="itemCatRows"></div>
      <button type="button" class="btn btn-ghost" id="addItemCatBtn" style="margin-top:6px">+ Add category</button>
    </div>`;
    document.getElementById('addItemCatBtn').onclick = () => addItemCatRow();
    addItemCatRow();
  } else {
    el.innerHTML = '';
  }
}
function addSlotGroupRow() {
  const wrap = document.getElementById('slotGroupRows');
  const row = document.createElement('div');
  row.className = 'slot-row';
  row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
  row.innerHTML = `
    <input placeholder="Label (e.g. Decorating - MS)" class="sg-label">
    <input placeholder="Start (e.g. 9:00 AM)" class="sg-start">
    <input placeholder="End (e.g. 10:00 AM)" class="sg-end">
    <input type="number" min="1" value="2" class="sg-cap">
    <button type="button" class="btn btn-ghost" style="padding:6px 10px" onclick="this.parentElement.remove()">✕</button>`;
  wrap.appendChild(row);
}
function readSlotGroupRows() {
  return [...document.querySelectorAll('#slotGroupRows .slot-row')].map((row, i) => ({
    id: 'sg' + i + '_' + Date.now(),
    label: row.querySelector('.sg-label').value.trim(),
    startTime: row.querySelector('.sg-start').value.trim(),
    endTime: row.querySelector('.sg-end').value.trim(),
    capacity: parseInt(row.querySelector('.sg-cap').value, 10) || 1,
  })).filter(g => g.label);
}
function addItemCatRow() {
  const wrap = document.getElementById('itemCatRows');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
  row.innerHTML = `
    <input placeholder="Category (e.g. Savory dish)" class="ic-label">
    <input type="number" min="1" value="5" class="ic-quota">
    <button type="button" class="btn btn-ghost" style="padding:6px 10px" onclick="this.parentElement.remove()">✕</button>`;
  wrap.appendChild(row);
}
function readItemCategoryRows() {
  return [...document.querySelectorAll('#itemCatRows .item-row')].map((row, i) => ({
    id: 'ic' + i + '_' + Date.now(),
    label: row.querySelector('.ic-label').value.trim(),
    quota: parseInt(row.querySelector('.ic-quota').value, 10) || 1,
  })).filter(c => c.label);
}

function wireTabHandlers() {
  const newEventBtn = document.getElementById('newEventBtn');
  if (newEventBtn) newEventBtn.onclick = () => {
    showOverlay(`<div class="modal wide" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Create event</h2>
      <div class="form-row"><label>Title</label><input id="neTitle"></div>
      <div class="form-row"><label>Date</label><input type="date" id="neDate"></div>
      <div class="form-row"><label>Time</label><input id="neTime" placeholder="e.g. 9:00 AM"></div>
      <div class="form-row"><label>Location</label><input id="neLoc"></div>
      <div class="form-row"><label>SAS Mappedin location (optional — type to search, makes the location name a clickable map link)</label>
        <input list="mappedinDatalist" id="neMappedin" placeholder="Start typing a room/location name…">
        <datalist id="mappedinDatalist">${MAPPEDIN_LOCATIONS.map(l => `<option value="${esc(l.name)}">`).join('')}</datalist>
      </div>
      <div class="form-row"><label>Event type</label>
        <select id="neType">
          <option value="standard">Standard (simple RSVP)</option>
          <option value="save_the_date">Save the Date (no RSVP yet)</option>
          <option value="volunteer_slots">Volunteer Slots (specific time slots)</option>
          <option value="item_signup">Item Sign-up (e.g. potluck dishes)</option>
        </select>
      </div>
      <div class="form-row"><label>Description</label>${rteHtml('neDescRTE')}</div>
      <div id="neTypeExtra"></div>
      <div class="form-row"><label>Attachments (documents — optional)</label><input type="file" id="neAttachments" multiple></div>
      <div class="form-row"><label>Photos (optional)</label><input type="file" id="neOwnPhotos" multiple accept="image/*"></div>
      <div class="form-row"><label>Divisions</label>
        <div class="role-grid">${ECOSYSTEMS.map(e => `<button type="button" class="role-opt" data-div="${e.id}">${e.icon} ${e.name}</button>`).join('')}</div>
      </div>
      <label style="display:flex;gap:8px;align-items:center;font-size:13px;margin-bottom:12px"><input type="checkbox" id="neSchoolwide" style="width:auto"> Schoolwide event (auto-tags all divisions)</label>
      <button class="btn btn-primary" style="width:100%" id="neSave">Create event</button>
    </div>`);
    document.querySelectorAll('#ovl .role-opt').forEach(b => b.onclick = () => b.classList.toggle('active'));
    document.getElementById('neType').onchange = (e) => renderTypeExtra(e.target.value);
    renderTypeExtra('standard');

    document.getElementById('neSave').onclick = async () => {
      const title = document.getElementById('neTitle').value.trim();
      const date = document.getElementById('neDate').value;
      if (!title || !date) { toast('Title and date are required.'); return; }
      const type = document.getElementById('neType').value;
      const schoolwide = document.getElementById('neSchoolwide').checked;
      const divisions = schoolwide ? ECOSYSTEMS.map(e => e.id) : [...document.querySelectorAll('#ovl .role-opt.active')].map(b => b.dataset.div);
      let description = rteValue('neDescRTE');
      if (type === 'save_the_date' && !description.trim()) description = 'More details coming soon.';
      const extra = {};
      if (type === 'volunteer_slots') extra.slotGroups = readSlotGroupRows();
      if (type === 'item_signup') extra.itemCategories = readItemCategoryRows();
      const saveBtn = document.getElementById('neSave');
      saveBtn.disabled = true; saveBtn.textContent = 'Creating…';
      try {
        const mappedinTyped = document.getElementById('neMappedin').value.trim();
        const mappedinMatch = MAPPEDIN_LOCATIONS.find(l => l.name === mappedinTyped);
        const ref = await addDoc(collection(db, 'events'), {
          title, date, time: document.getElementById('neTime').value.trim(),
          location: document.getElementById('neLoc').value.trim(),
          mappedinLocationId: mappedinMatch ? mappedinMatch.id : null,
          description, type, ...extra,
          divisions, adminUids: [getProfile().uid], attachments: [], photos: [], createdAt: serverTimestamp(),
        });
        const { storage } = await import("./js/firebase-init.js");
        const attachFiles = [...document.getElementById('neAttachments').files];
        for (const file of attachFiles) {
          const r = storageRef(storage, `eventAttachments/${ref.id}/${Date.now()}_${file.name}`);
          await uploadBytes(r, file);
          const url = await getDownloadURL(r);
          await updateDoc(doc(db, 'events', ref.id), { attachments: arrayUnion({ name: file.name, url }) });
        }
        const photoFiles = [...document.getElementById('neOwnPhotos').files];
        for (const file of photoFiles) {
          const r = storageRef(storage, `eventPhotos/${ref.id}/${Date.now()}_${file.name}`);
          await uploadBytes(r, file);
          const url = await getDownloadURL(r);
          await updateDoc(doc(db, 'events', ref.id), { photos: arrayUnion(url) });
        }
        await logAudit('Created event', title);
        closeOverlay(); toast('Event created!');
      } catch (e) { toast('Could not create event: ' + e.message); saveBtn.disabled = false; saveBtn.textContent = 'Create event'; }
    };
  };

  window.__deleteEvent = async (id) => {
    if (!confirm('Delete this event? This cannot be undone.')) return;
    try { await deleteDoc(doc(db, 'events', id)); await logAudit('Deleted event', id); toast('Event deleted.'); }
    catch (e) { toast('Could not delete: ' + e.message); }
  };

  window.__removeHours = async (id) => {
    if (!confirm('Remove this hours entry? Use this if the volunteer didn\'t actually show up.')) return;
    try { await deleteDoc(doc(db, 'hours', id)); await logAudit('Removed hours entry (no-show)', id); toast('Removed.'); }
    catch (e) { toast('Could not remove: ' + e.message); }
  };

  window.__sortMembers = (field) => {
    if (memberSortField === field) memberSortDir = memberSortDir === 'asc' ? 'desc' : 'asc';
    else { memberSortField = field; memberSortDir = 'asc'; }
    render();
  };

  window.__toggleFlag = async (uid, field, value) => {
    if (!isSuperadmin()) { toast('Only a Superadmin can do this.'); return; }
    if (!confirm(`${value ? 'Grant' : 'Remove'} ${field} for this member?`)) return;
    try {
      await updateDoc(doc(db, 'users', uid), { [field]: value });
      await logAudit(`${value ? 'Granted' : 'Removed'} ${field}`, uid);
      toast('Updated.');
    } catch (e) { toast('Could not update: ' + e.message); }
  };

  window.__removeMember = async (uid) => {
    if (!isSuperadmin()) { toast('Only a Superadmin can do this.'); return; }
    if (!confirm('Remove this member? Their data will be archived first.')) return;
    try {
      const userSnap = await getDoc(doc(db, 'users', uid));
      const userSignups = await getDocs(query(collection(db, 'signups'), where('uid', '==', uid)));
      const userCafe = await getDocs(query(collection(db, 'cafeSignups'), where('uid', '==', uid)));
      const userHours = await getDocs(query(collection(db, 'hours'), where('uid', '==', uid)));
      await addDoc(collection(db, 'removedMemberArchive'), {
        uid, profile: userSnap.exists() ? userSnap.data() : null,
        signups: userSignups.docs.map(d => d.data()),
        cafeSignups: userCafe.docs.map(d => d.data()),
        hours: userHours.docs.map(d => d.data()),
        removedBy: getProfile().displayName, removedAt: serverTimestamp(),
      });
      await deleteDoc(doc(db, 'users', uid));
      await logAudit('Removed member', uid);
      toast('Member archived and removed.');
    } catch (e) { toast('Could not remove: ' + e.message); }
  };

  // ---- Cafe volunteers tab ----
  window.__cafeRange = (r) => { cafeRange = r; render(); };
  window.__cafeToday = () => { cafeAnchor = dstr(new Date()); render(); };
  window.__cafeNav = (dir) => {
    const d = new Date(cafeAnchor + 'T00:00:00');
    if (cafeRange === 'day') d.setDate(d.getDate() + dir);
    else if (cafeRange === 'week') d.setDate(d.getDate() + dir * 7);
    else d.setMonth(d.getMonth() + dir);
    cafeAnchor = dstr(d); render();
  };
  window.__cafeSort = (field) => {
    if (cafeSortField === field) cafeSortDir = cafeSortDir === 'asc' ? 'desc' : 'asc';
    else { cafeSortField = field; cafeSortDir = 'asc'; }
    render();
  };
  window.__cafeToggleEmpty = () => { cafeShowEmpty = !cafeShowEmpty; render(); };
  window.__cafeToggleSel = (id) => {
    if (cafeSelected.has(id)) cafeSelected.delete(id); else cafeSelected.add(id);
    render();
  };
  window.__cafeSelectAll = () => {
    cafeVisibleRows().forEach(r => { if (!r.isEmpty) cafeSelected.add(r.id); });
    render();
  };
  window.__cafeClearSel = () => { cafeSelected.clear(); render(); };

  window.__cafeExport = () => {
    const shown = cafeVisibleRows();
    // Export the selected shifts when there's a selection, otherwise everything shown.
    const picked = shown.filter(r => !r.isEmpty && cafeSelected.has(r.id));
    const rows = picked.length ? picked : shown;
    if (!rows.length) { toast('Nothing to export.'); return; }
    const blob = new Blob([cafeCsv(rows)], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cafe-volunteers-${cafeRange}-${cafeAnchor}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast(`Exported ${rows.length} ${rows.length === 1 ? 'row' : 'rows'}.`);
  };

  window.__cafeEmail = () => {
    if (!cafeSelected.size) { toast('Select at least one shift first.'); return; }
    // Selection is per shift, so collapse to unique people before emailing —
    // three shifts for the same volunteer must still be one message.
    const selectedRows = cafeSeatRows().filter(r => !r.isEmpty && cafeSelected.has(r.id));
    const uids = [...new Set(selectedRows.map(r => r.uid))];
    const recipients = []; let optedOut = 0, noEmail = 0;
    uids.forEach(uid => {
      const u = users[uid];
      if (!u) { noEmail++; return; }
      if (u.emailOptOut) { optedOut++; return; }
      if (!u.email) { noEmail++; return; }
      recipients.push(u.email);
    });
    const emails = [...new Set(recipients)]; // belt and braces against shared addresses
    if (!emails.length) { toast('None of the selected volunteers can be emailed.'); return; }
    const notes = [];
    if (optedOut) notes.push(`${optedOut} opted out`);
    if (noEmail) notes.push(`${noEmail} without an email`);
    const shiftCount = selectedRows.length;
    showOverlay(`<div class="modal" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Email Cafe volunteers</h2>
      <p style="font-size:13.5px;color:var(--ink-soft)">
        ${shiftCount} ${shiftCount === 1 ? 'shift' : 'shifts'} selected →
        sending to <strong>${emails.length}</strong> ${emails.length === 1 ? 'volunteer' : 'volunteers'} (one email each).
        ${notes.length ? `<br>(${notes.join(', ')} — not included.)` : ''}
        <br>Each person gets their own email — nobody sees anyone else's address.
      </p>
      <div class="form-row"><label>Subject</label><input id="cmSubject" value="PTA Cafe — a message for volunteers"></div>
      <div class="form-row"><label>Replies go to</label><input id="cmReplyTo" value="${esc((getProfile() || {}).email || '')}" placeholder="you@example.com"></div>
      ${(getProfile() || {}).email ? `<label style="display:flex;gap:8px;align-items:center;font-size:13px;margin-bottom:12px"><input type="checkbox" id="cmCopyMe" style="width:auto"> Send me a copy too</label>` : ''}
      <div class="form-row"><label>Message</label><textarea id="cmBody" rows="7" placeholder="Write your message…"></textarea></div>
      <button class="btn btn-primary" style="width:100%" id="cmSend">Send email</button>
    </div>`);
    document.getElementById('cmSend').onclick = async () => {
      const subject = document.getElementById('cmSubject').value.trim();
      const body = document.getElementById('cmBody').value.trim();
      if (!subject) { toast('Please add a subject.'); return; }
      if (!body) { toast('Please write a message.'); return; }
      const btn = document.getElementById('cmSend');
      btn.disabled = true; btn.textContent = 'Sending…';
      const replyTo = document.getElementById('cmReplyTo').value.trim();
      const me = getProfile();
      const copyMeEl = document.getElementById('cmCopyMe');
      // Add myself only if not already selected, so I never get two copies.
      const recipients = (copyMeEl && copyMeEl.checked && me.email && !emails.includes(me.email))
        ? [...emails, me.email] : emails;
      try {
        await queueEmails({
          recipients, subject, body, replyTo,
          reason: "You're receiving this because you signed up for a PTA Cafe shift.",
          scope: 'cafe',
        });
        await logAudit('Emailed Cafe volunteers', `${recipients.length} recipients — ${subject}`);
        closeOverlay();
        toast(`Email queued to ${recipients.length} ${recipients.length === 1 ? 'volunteer' : 'volunteers'}.`);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Send email';
        toast('Could not send: ' + e.message);
      }
    };
  };

  window.__viewSent = (key) => {
    const b = sentBatches().find(x => x.key === key);
    if (!b) return;
    const failures = sentMail
      .filter(m => (m.batchId || m.id) === key && m.delivery && m.delivery.state === 'ERROR')
      .map(m => `${(m.to || [])[0] || '?'}: ${esc((m.delivery.error || '').toString().slice(0, 200))}`);
    showOverlay(`<div class="modal wide" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2 style="margin-bottom:4px">${esc(b.subject)}</h2>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:14px">
        Sent by ${esc(b.sentByName)}
        ${b.createdAt?.seconds ? ` · ${esc(new Date(b.createdAt.seconds * 1000).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }))}` : ''}
        ${b.replyTo ? ` · replies to ${esc(b.replyTo)}` : ''}
      </div>
      <div class="form-row"><label>Message</label>
        <div style="white-space:pre-wrap;font-size:13.5px;border:1.5px solid var(--line);border-radius:9px;padding:12px;max-height:280px;overflow:auto">${esc(b.body)}</div>
      </div>
      ${failures.length ? `<div class="form-row"><label style="color:var(--red)">Failed deliveries</label>
        <div style="font-size:12.5px;border:1.5px solid var(--line);border-radius:9px;padding:12px;max-height:140px;overflow:auto">${failures.join('<br>')}</div>
      </div>` : ''}
      <div class="form-row"><label>Recipients (${b.recipients.length})</label>
        <div style="font-size:12.5px;border:1.5px solid var(--line);border-radius:9px;padding:12px;max-height:200px;overflow:auto">${b.recipients.map(esc).join('<br>') || '—'}</div>
      </div>
    </div>`);
  };

  // ---- PTA Cafe menu files ----
  const cafeMenuUploadBtn = document.getElementById('cafeMenuUploadBtn');
  if (cafeMenuUploadBtn) cafeMenuUploadBtn.onclick = async () => {
    const nameEl = document.getElementById('cmName');
    const fileEl = document.getElementById('cmFile');
    const name = nameEl.value.trim();
    const file = fileEl.files && fileEl.files[0];
    if (!name) { toast('Give the menu a name first.'); return; }
    if (!file) { toast('Choose a PDF or image first.'); return; }
    const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    const isImage = (file.type || '').startsWith('image/');
    if (!isPdf && !isImage) { toast('Only PDF or image files are supported.'); return; }
    cafeMenuUploadBtn.disabled = true; cafeMenuUploadBtn.textContent = 'Uploading…';
    try {
      const { storage } = await import("./js/firebase-init.js");
      const id = 'menu_' + Date.now();
      const path = `cafeMenu/${id}_${file.name}`;
      const r = storageRef(storage, path);
      await uploadBytes(r, file);
      const url = await getDownloadURL(r);
      const item = {
        id, name, url, path,
        type: isPdf ? 'pdf' : 'image',
        // serverTimestamp() can't be used inside an array element, so store an ISO string.
        uploadedAt: new Date().toISOString(),
        uploadedBy: getProfile().displayName,
      };
      await setDoc(doc(db, 'settings', 'cafeMenu'), { items: [...(cafeMenu.items || []), item] }, { merge: true });
      await logAudit('Uploaded Cafe menu', name);
      nameEl.value = ''; fileEl.value = '';
      toast('Menu uploaded.');
    } catch (e) {
      toast('Could not upload: ' + e.message);
    } finally {
      cafeMenuUploadBtn.disabled = false; cafeMenuUploadBtn.textContent = 'Upload';
    }
  };

  window.__cafeMenuDelete = async (id) => {
    const item = (cafeMenu.items || []).find(m => m.id === id);
    if (!item) return;
    if (!confirm(`Delete "${item.name}" from the PTA Cafe page?`)) return;
    try {
      const remaining = (cafeMenu.items || []).filter(m => m.id !== id);
      await setDoc(doc(db, 'settings', 'cafeMenu'), { items: remaining }, { merge: true });
      // Drop the stored file too, so deleted menus don't linger in Storage.
      if (item.path) {
        try {
          const { storage } = await import("./js/firebase-init.js");
          await deleteObject(storageRef(storage, item.path));
        } catch (e) { /* file already gone — the listing is what matters */ }
      }
      await logAudit('Deleted Cafe menu', item.name);
      toast('Menu deleted.');
    } catch (e) { toast('Could not delete: ' + e.message); }
  };
}
</script>
</body>
</html>

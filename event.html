<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VolunteerSAS — Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"><div class="section"><p style="color:var(--ink-soft)">Loading…</p></div></div>
<div id="ovl"></div>

<script type="module">
import { watchAuth, getProfile, isSuperadmin, isAnyAdminTier, ECOSYSTEMS } from "./js/auth.js";
import {
  db, doc, getDoc, updateDoc, deleteDoc, addDoc, collection, onSnapshot, query, where,
  serverTimestamp, arrayUnion, storageRef, uploadBytes, getDownloadURL
} from "./js/firebase-init.js";
import { toast, showOverlay, closeOverlay, bubbleRowHtml, esc, renderHeader } from "./js/common.js";
import { renderChatPanel } from "./js/chat.js";
import { renderAddToCalendar } from "./js/calendar.js";
import { rteHtml, rteValue } from "./js/rte.js";
import { MAPPEDIN_LOCATIONS, mappedinLocationUrl, findMappedinLocation } from "./js/mappedin-locations.js";

const root = document.getElementById('root');
const params = new URLSearchParams(location.search);
const eventId = params.get('id');
let ev = null, signups = [], slotSignups = [], itemSignups = [], usersCache = {}, editing = false;

// Flip to true only once ALL of these are done: (1) Brevo account + a verified
// sender, (2) the Firebase "Trigger Email from Firestore" extension installed and
// pointed at Brevo with a default From address, (3) the `mail` rule published in
// the Firestore console. Until then the "Email everyone" button explains it isn't
// connected, so no message is ever silently dropped into an unsent queue.
const EMAIL_ENABLED = true;

if (!eventId) { root.innerHTML = `<div class="section"><p>No event specified.</p></div>`; }

watchAuth((profile, needsProfile) => {
  if (needsProfile) { location.href = 'index.html'; return; }
  renderHeader();
  loadEvent();
}, () => { location.href = 'index.html'; });

function myAdminHere() {
  return ev && (isSuperadmin() || (ev.adminUids || []).includes(getProfile().uid));
}

async function notifyEventAdmins(message) {
  const admins = (ev.adminUids || []).filter(uid => uid !== getProfile().uid);
  for (const uid of admins) {
    try {
      await addDoc(collection(db, 'notifications'), {
        to: uid, from: getProfile().displayName, subject: 'A sign-up was cancelled',
        body: message, read: false, createdAt: serverTimestamp(),
      });
    } catch (e) { /* non-fatal */ }
  }
}

// Gather email addresses for everyone registered for this event, across all
// four sign-up types. Excludes anyone who opted out of email or has no address.
async function collectEmailRecipients() {
  const uids = [...new Set([
    ...signups.map(s => s.uid),
    ...slotSignups.map(s => s.uid),
    ...itemSignups.map(s => s.uid),
  ].filter(Boolean))];
  const emails = [];
  let optedOut = 0, noEmail = 0;
  for (const uid of uids) {
    let u = usersCache[uid];
    if (!u) {
      try {
        const s = await getDoc(doc(db, 'users', uid));
        if (s.exists()) { u = { uid, ...s.data() }; usersCache[uid] = u; }
      } catch (e) { /* skip unreadable */ }
    }
    if (!u) { noEmail++; continue; }
    if (u.emailOptOut) { optedOut++; continue; }
    if (!u.email) { noEmail++; continue; }
    emails.push(u.email);
  }
  return { emails: [...new Set(emails)], optedOut, noEmail };
}

function loadEvent() {
  onSnapshot(doc(db, 'events', eventId), snap => {
    if (!snap.exists()) { root.innerHTML = `<div class="section"><p>This event no longer exists.</p></div>`; return; }
    ev = { id: snap.id, ...snap.data() };
    render();
  });
  onSnapshot(query(collection(db, 'signups'), where('eventId', '==', eventId)), snap => {
    signups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    hydrateUsers();
  });
  onSnapshot(query(collection(db, 'eventSlotSignups'), where('eventId', '==', eventId)), snap => {
    slotSignups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  onSnapshot(query(collection(db, 'eventItemSignups'), where('eventId', '==', eventId)), snap => {
    itemSignups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

async function hydrateUsers() {
  const needed = [...new Set(signups.map(s => s.uid))].filter(uid => !usersCache[uid]);
  for (const uid of needed) {
    const s = await getDoc(doc(db, 'users', uid));
    if (s.exists()) usersCache[uid] = { uid, ...s.data() };
  }
  render();
}

function myProfileRecord() { return getProfile(); }
function mySignup() { return signups.find(s => s.uid === myProfileRecord().uid); }

function render() {
  if (!ev) return;
  const isAdminHere = myAdminHere();
  const attendees = signups.map(s => usersCache[s.uid]).filter(Boolean);
  root.innerHTML = `<div class="section" style="max-width:760px;margin:0 auto">
    <a href="index.html" class="small-link">← Back to Discover</a>

    <div class="card" style="padding:20px;margin-top:12px">
      ${editing ? renderEditForm() : `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft)">${(ev.divisions || []).map(id => (ECOSYSTEMS.find(e => e.id === id) || {}).short || id).join(', ')}</div>
        <h1 class="serif" style="font-size:24px;margin:6px 0">${esc(ev.title || 'Untitled event')}</h1>
        <div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:14px">📅 ${esc(ev.date || '')} ${ev.time ? '· ' + esc(ev.time) : ''} · 📍 ${renderLocation()}</div>
        <div style="font-size:14px;line-height:1.6">${ev.description || ''}</div>
      `}
      ${isAdminHere && !editing ? `<button class="btn btn-ghost" style="margin-top:10px" id="editBtn">✏️ Edit event</button>` : ''}
    </div>

    ${renderParticipationSection(isAdminHere)}

    ${(ev.attachments || []).length ? `<div class="card" style="padding:18px;margin-top:16px">
      <h3 style="margin-top:0">📎 Attachments</h3>
      ${(ev.attachments || []).map(a => `<div style="font-size:13.5px;padding:4px 0"><a href="${esc(a.url)}" target="_blank" class="small-link">📄 ${esc(a.name)}</a></div>`).join('')}
    </div>` : ''}

    ${(ev.photos || []).length ? `<div class="card" style="padding:18px;margin-top:16px">
      <h3 style="margin-top:0">📷 Photos</h3>
      <div class="grid">${(ev.photos || []).map(url => `<div class="card" style="overflow:hidden;padding:0"><img src="${esc(url)}" style="width:100%;display:block"></div>`).join('')}</div>
    </div>` : ''}

    <div class="card" style="padding:18px;margin-top:16px">
      <h3 style="margin-top:0">💬 Discussion</h3>
      <div id="eventChat"></div>
    </div>

    ${isAdminHere ? `
    <div class="card" style="padding:18px;margin-top:16px;border-left:4px solid var(--navy)">
      <h3 style="margin-top:0">Admin tools</h3>
      <button class="btn btn-secondary" id="emailAllBtn">✉️ Email everyone registered</button>
      <div style="margin-top:14px">
        <label style="font-size:12.5px;font-weight:600;color:var(--ink-soft)">Add a co-admin for this event</label>
        <div id="addCoAdminWrap" style="margin-top:6px">Loading eligible admins…</div>
      </div>
    </div>` : ''}
  </div>`;

  renderChatPanel('eventChat', 'event', eventId, { canModerate: isAdminHere });
  renderAddToCalendar('addCalEvent', {
    title: ev.title, date: ev.date, startTime: ev.time, durationHrs: 2,
    location: ev.location, description: ev.description,
  });
  wireHandlers(isAdminHere);
  if (isAdminHere) loadCoAdminPicker();
}

function renderLocation() {
  if (ev.mappedinLocationId) {
    const loc = findMappedinLocation(ev.mappedinLocationId);
    const label = loc ? loc.name : (ev.location || 'View on map');
    return `<a href="${mappedinLocationUrl(ev.mappedinLocationId)}" target="_blank" class="small-link">${esc(label)} ↗</a>`;
  }
  return esc(ev.location || '');
}

function renderParticipationSection(isAdminHere) {
  const type = ev.type || 'standard';
  if (type === 'save_the_date') {
    return `<div class="card" style="padding:18px;margin-top:16px">
      <p style="color:var(--ink-soft);font-size:13.5px;margin:0">📌 Save the date — sign-ups aren't open yet. Check back for details.</p>
      <div id="addCalEvent"></div>
    </div>`;
  }
  if (type === 'volunteer_slots') return renderSlotGroupsSection(isAdminHere);
  if (type === 'item_signup') return renderItemCategoriesSection(isAdminHere);

  const attendees = signups.map(s => usersCache[s.uid]).filter(Boolean);
  return `<div class="card" style="padding:18px;margin-top:16px">
    <h3 style="margin-top:0">Who's going (${attendees.length})</h3>
    ${bubbleRowHtml(attendees, 20)}
    ${isAdminHere ? renderAttendeeAdminList(attendees) : ''}
    <div style="margin-top:14px">
      ${mySignup()
        ? `<button class="btn btn-ghost" id="unrsvpBtn">Un-RSVP</button>`
        : `<button class="btn btn-primary" id="rsvpBtn">RSVP</button>`}
    </div>
    <div id="addCalEvent"></div>
  </div>`;
}

function renderSlotGroupsSection(isAdminHere) {
  const groups = ev.slotGroups || [];
  return `<div class="card" style="padding:18px;margin-top:16px">
    <h3 style="margin-top:0">Volunteer slots</h3>
    ${!groups.length ? `<p style="color:var(--ink-soft);font-size:13px">No slots have been set up yet.</p>` : groups.map(g => {
      const filled = slotSignups.filter(s => s.slotGroupId === g.id);
      const spotsLeft = g.capacity - filled.length;
      let rows = filled.map(s => `<div style="font-size:12.5px;padding:4px 0;display:flex;justify-content:space-between">
          <span><strong>${esc(s.name)}</strong>${s.comment ? ` — <span style="color:var(--ink-soft)">${esc(s.comment)}</span>` : ''}</span>
          ${s.uid === getProfile().uid || isAdminHere ? `<button class="small-link" style="color:var(--red)" onclick="window.__removeSlotSignup('${s.id}')">Remove</button>` : ''}
        </div>`).join('');
      for (let i = 0; i < spotsLeft; i++) rows += `<div style="font-size:12.5px;padding:4px 0;color:var(--ink-soft)">Open slot — <button class="small-link" onclick="window.__openSlotSignup('${g.id}')">Sign up</button></div>`;
      return `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:13.5px">${esc(g.label)} <span style="color:var(--ink-soft);font-weight:400">(${esc(g.startTime)}–${esc(g.endTime)})</span></span>
          <span class="chip" style="background:${spotsLeft<=0?'#E3F3EC':'#FDF1D8'};color:${spotsLeft<=0?'#0E8A6D':'#96721E'}">${spotsLeft<=0?'Full':spotsLeft+' open'}</span>
        </div>
        <div style="margin-top:6px">${rows}</div>
      </div>`;
    }).join('')}
    <div id="addCalEvent"></div>
  </div>`;
}

function renderItemCategoriesSection(isAdminHere) {
  const cats = ev.itemCategories || [];
  return `<div class="card" style="padding:18px;margin-top:16px">
    <h3 style="margin-top:0">What to bring</h3>
    ${!cats.length ? `<p style="color:var(--ink-soft);font-size:13px">No items have been requested yet.</p>` : cats.map(c => {
      const signed = itemSignups.filter(s => s.categoryId === c.id);
      const spotsLeft = c.quota - signed.length;
      let rows = signed.map(s => `<div style="font-size:12.5px;padding:4px 0;display:flex;justify-content:space-between">
          <span><strong>${esc(s.name)}</strong> — ${esc(s.item)}</span>
          ${s.uid === getProfile().uid || isAdminHere ? `<button class="small-link" style="color:var(--red)" onclick="window.__removeItemSignup('${s.id}')">Remove</button>` : ''}
        </div>`).join('');
      return `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:13.5px">${esc(c.label)}</span>
          <span class="chip" style="background:${spotsLeft<=0?'#E3F3EC':'#FDF1D8'};color:${spotsLeft<=0?'#0E8A6D':'#96721E'}">${signed.length}/${c.quota} claimed</span>
        </div>
        <div style="margin-top:6px">${rows}</div>
        ${spotsLeft > 0 ? `<button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:12.5px" onclick="window.__openItemSignup('${c.id}')">+ Sign up to bring something</button>` : ''}
      </div>`;
    }).join('')}
    <div id="addCalEvent"></div>
  </div>`;
}

function renderAttendeeAdminList(attendees) {
  return `<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">
    ${signups.map(s => {
      const u = usersCache[s.uid]; if (!u) return '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:4px 0">
        <span>${esc(u.anonymous ? 'Anonymous volunteer' : u.displayName)}</span>
        <button class="small-link" style="color:var(--red)" onclick="window.__unrsvpOther('${s.id}','${s.uid}')">Un-RSVP</button>
      </div>`;
    }).join('')}
  </div>`;
}

function renderEditForm() {
  const typeLabels = { standard: 'Standard (RSVP)', save_the_date: 'Save the Date', volunteer_slots: 'Volunteer Slots', item_signup: 'Item Sign-up' };
  return `
    <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Event type: <strong>${typeLabels[ev.type || 'standard']}</strong> (set at creation, can't be changed here)</div>
    <div class="form-row"><label>Title</label><input id="edTitle" value="${esc(ev.title || '')}"></div>
    <div class="form-row"><label>Date</label><input id="edDate" type="date" value="${esc(ev.date || '')}"></div>
    <div class="form-row"><label>Time</label><input id="edTime" value="${esc(ev.time || '')}" placeholder="e.g. 9:00 AM"></div>
    <div class="form-row"><label>Location</label><input id="edLoc" value="${esc(ev.location || '')}"></div>
    <div class="form-row"><label>SAS Mappedin location (optional — type to search)</label>
      <input list="mappedinDatalist" id="edMappedin" value="${ev.mappedinLocationId ? esc((findMappedinLocation(ev.mappedinLocationId) || {}).name || '') : ''}" placeholder="Start typing a room/location name…">
      <datalist id="mappedinDatalist">${MAPPEDIN_LOCATIONS.map(l => `<option value="${esc(l.name)}">`).join('')}</datalist>
    </div>
    <div class="form-row"><label>Description</label>${rteHtml('edDescRTE', ev.description || '')}</div>
    <div class="form-row"><label>Add attachments</label><input type="file" id="edAttachments" multiple></div>
    <div class="form-row"><label>Add photos</label><input type="file" id="edPhotos" multiple accept="image/*"></div>
    <div class="form-row"><label>Divisions</label>
      <div class="role-grid">${ECOSYSTEMS.map(e => `<button type="button" class="role-opt ${((ev.divisions || []).includes(e.id)) ? 'active' : ''}" data-div="${e.id}">${e.icon} ${e.name}</button>`).join('')}</div>
    </div>
    <button class="btn btn-primary" id="saveEditBtn">Save changes</button>
    <button class="btn btn-ghost" id="cancelEditBtn" style="margin-left:8px">Cancel</button>`;
}

function wireHandlers(isAdminHere) {
  const editBtn = document.getElementById('editBtn');
  if (editBtn) editBtn.onclick = () => { editing = true; render(); };
  const cancelBtn = document.getElementById('cancelEditBtn');
  if (cancelBtn) cancelBtn.onclick = () => { editing = false; render(); };
  const saveBtn = document.getElementById('saveEditBtn');
  if (saveBtn) saveBtn.onclick = async () => {
    const divisions = [...document.querySelectorAll('#root .role-opt.active')].map(b => b.dataset.div);
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await updateDoc(doc(db, 'events', eventId), {
        title: document.getElementById('edTitle').value.trim(),
        date: document.getElementById('edDate').value,
        time: document.getElementById('edTime').value.trim(),
        location: document.getElementById('edLoc').value.trim(),
        mappedinLocationId: (MAPPEDIN_LOCATIONS.find(l => l.name === document.getElementById('edMappedin').value.trim()) || {}).id || null,
        description: rteValue('edDescRTE'),
        divisions,
      });
      const { storage } = await import("./js/firebase-init.js");
      const attachFiles = [...document.getElementById('edAttachments').files];
      for (const file of attachFiles) {
        const r = storageRef(storage, `eventAttachments/${eventId}/${Date.now()}_${file.name}`);
        await uploadBytes(r, file);
        const url = await getDownloadURL(r);
        await updateDoc(doc(db, 'events', eventId), { attachments: arrayUnion({ name: file.name, url }) });
      }
      const photoFiles = [...document.getElementById('edPhotos').files];
      for (const file of photoFiles) {
        const r = storageRef(storage, `eventPhotos/${eventId}/${Date.now()}_${file.name}`);
        await uploadBytes(r, file);
        const url = await getDownloadURL(r);
        await updateDoc(doc(db, 'events', eventId), { photos: arrayUnion(url) });
      }
      editing = false; toast('Event updated.');
    } catch (e) { toast('Could not save: ' + e.message); saveBtn.disabled = false; saveBtn.textContent = 'Save changes'; }
  };

  const rsvpBtn = document.getElementById('rsvpBtn');
  if (rsvpBtn) rsvpBtn.onclick = async () => {
    try {
      await addDoc(collection(db, 'signups'), { eventId, uid: getProfile().uid, createdAt: serverTimestamp() });
      toast('RSVP confirmed!');
    } catch (e) { toast('Could not RSVP: ' + e.message); }
  };
  const unrsvpBtn = document.getElementById('unrsvpBtn');
  if (unrsvpBtn) unrsvpBtn.onclick = async () => {
    const s = mySignup(); if (!s) return;
    try {
      await deleteDoc(doc(db, 'signups', s.id));
      await notifyEventAdmins(`${getProfile().displayName} un-RSVP'd from "${ev.title}".`);
      toast('Un-RSVP\'d.');
    } catch (e) { toast('Could not un-RSVP: ' + e.message); }
  };
  window.__unrsvpOther = async (signupId, uid) => {
    if (!confirm('Un-RSVP this person from the event?')) return;
    try {
      await deleteDoc(doc(db, 'signups', signupId));
      await addDoc(collection(db, 'notifications'), {
        to: uid, from: getProfile().displayName, subject: 'You were un-RSVP\'d',
        body: `An admin removed your RSVP for "${ev.title}".`, read: false, createdAt: serverTimestamp(),
      });
      toast('Removed and notified.');
    } catch (e) { toast('Could not remove: ' + e.message); }
  };

  window.__openSlotSignup = (slotGroupId) => {
    const g = (ev.slotGroups || []).find(x => x.id === slotGroupId); if (!g) return;
    showOverlay(`<div class="modal" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Sign up — ${esc(g.label)}</h2>
      <p style="font-size:13.5px;color:var(--ink-soft)">${esc(g.startTime)}–${esc(g.endTime)}</p>
      <div class="form-row"><label>Comment (optional)</label><textarea id="slotComment" rows="2"></textarea></div>
      <button class="btn btn-primary" style="width:100%" id="confirmSlotSignup">Confirm</button>
    </div>`);
    document.getElementById('confirmSlotSignup').onclick = async () => {
      const filled = slotSignups.filter(s => s.slotGroupId === slotGroupId);
      if (filled.length >= g.capacity) { toast('That slot just filled.'); return; }
      try {
        await addDoc(collection(db, 'eventSlotSignups'), {
          eventId, slotGroupId, uid: getProfile().uid, name: getProfile().displayName,
          comment: document.getElementById('slotComment').value.trim(), createdAt: serverTimestamp(),
        });
        closeOverlay(); toast('Signed up!');
      } catch (e) { toast('Could not sign up: ' + e.message); }
    };
  };
  window.__removeSlotSignup = async (id) => {
    const s = slotSignups.find(x => x.id === id);
    try {
      await deleteDoc(doc(db, 'eventSlotSignups', id));
      if (s && s.uid === getProfile().uid) {
        const g = (ev.slotGroups || []).find(x => x.id === s.slotGroupId) || {};
        await notifyEventAdmins(`${getProfile().displayName} cancelled their "${g.label || 'slot'}" sign-up for "${ev.title}".`);
      }
      toast('Removed.');
    } catch (e) { toast('Could not remove: ' + e.message); }
  };

  window.__openItemSignup = (categoryId) => {
    const c = (ev.itemCategories || []).find(x => x.id === categoryId); if (!c) return;
    showOverlay(`<div class="modal" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Sign up — ${esc(c.label)}</h2>
      <div class="form-row"><label>What are you bringing?</label><input id="itemDesc" placeholder="e.g. Chocolate chip cookies"></div>
      <button class="btn btn-primary" style="width:100%" id="confirmItemSignup">Confirm</button>
    </div>`);
    document.getElementById('confirmItemSignup').onclick = async () => {
      const item = document.getElementById('itemDesc').value.trim();
      if (!item) { toast('Please say what you\'re bringing.'); return; }
      const signed = itemSignups.filter(s => s.categoryId === categoryId);
      if (signed.length >= c.quota) { toast('This category is already full.'); return; }
      try {
        await addDoc(collection(db, 'eventItemSignups'), {
          eventId, categoryId, uid: getProfile().uid, name: getProfile().displayName, item, createdAt: serverTimestamp(),
        });
        closeOverlay(); toast('Signed up!');
      } catch (e) { toast('Could not sign up: ' + e.message); }
    };
  };
  window.__removeItemSignup = async (id) => {
    const s = itemSignups.find(x => x.id === id);
    try {
      await deleteDoc(doc(db, 'eventItemSignups', id));
      if (s && s.uid === getProfile().uid) {
        await notifyEventAdmins(`${getProfile().displayName} cancelled bringing "${s.item}" for "${ev.title}".`);
      }
      toast('Removed.');
    } catch (e) { toast('Could not remove: ' + e.message); }
  };

  const emailBtn = document.getElementById('emailAllBtn');
  if (emailBtn) emailBtn.onclick = async () => {
    if (!EMAIL_ENABLED) {
      toast("Email sending isn't connected yet — the PTA is still finishing setup.");
      return;
    }
    emailBtn.disabled = true;
    const originalLabel = emailBtn.textContent;
    emailBtn.textContent = 'Gathering recipients…';
    let recipients;
    try { recipients = await collectEmailRecipients(); }
    finally { emailBtn.disabled = false; emailBtn.textContent = originalLabel; }
    const { emails, optedOut, noEmail } = recipients;
    if (emails.length === 0) {
      toast((optedOut || noEmail)
        ? 'No one to email — everyone registered has opted out or has no email.'
        : 'No one has registered yet.');
      return;
    }
    const notes = [];
    if (optedOut) notes.push(`${optedOut} opted out`);
    if (noEmail) notes.push(`${noEmail} without an email`);
    showOverlay(`<div class="modal" style="position:relative">
      <button class="close-x" onclick="closeOverlay()">✕</button>
      <h2>Email everyone registered</h2>
      <p style="font-size:13.5px;color:var(--ink-soft)">
        Sending to <strong>${emails.length}</strong> ${emails.length === 1 ? 'person' : 'people'} registered for "${esc(ev.title)}".
        ${notes.length ? `<br>(${notes.join(', ')} — not included.)` : ''}
        <br>Recipients are BCC'd, so they can't see each other's addresses.
      </p>
      <div class="form-row"><label>Subject</label><input id="emSubject" value="${esc(ev.title)} — a message from the organizers"></div>
      <div class="form-row"><label>Message</label><textarea id="emBody" rows="7" placeholder="Write your message to everyone who registered…"></textarea></div>
      <button class="btn btn-primary" style="width:100%" id="confirmEmail">Send email</button>
    </div>`);
    document.getElementById('confirmEmail').onclick = async () => {
      const subject = document.getElementById('emSubject').value.trim();
      const body = document.getElementById('emBody').value.trim();
      if (!subject) { toast('Please add a subject.'); return; }
      if (!body) { toast('Please write a message.'); return; }
      const btn = document.getElementById('confirmEmail');
      btn.disabled = true; btn.textContent = 'Sending…';
      const me = getProfile();
      // Unsubscribe path: recipients turn off email in their own profile. Uses
      // the current site origin so it stays correct if the domain later changes.
      const prefsUrl = `${location.origin}/profile.html`;
      const textFooter =
        `\n\n— SAS PTA · VolunteerSAS\nYou're receiving this because you registered for a PTA event. ` +
        `To stop receiving these emails, sign in and turn off email notifications in your profile: ${prefsUrl}`;
      const htmlFooter =
        `<br><br><hr style="border:none;border-top:1px solid #e5e0d8">` +
        `<p style="font-size:12px;color:#8a857c;margin:0">— SAS PTA · VolunteerSAS<br>` +
        `You're receiving this because you registered for a PTA event. ` +
        `<a href="${prefsUrl}">Sign in and turn off email notifications</a> to stop receiving these.</p>`;
      const mailDoc = {
        bcc: emails,
        message: {
          subject,
          text: body + textFooter,
          // We deliberately DON'T set `from` — the Firebase extension's default
          // sender is used, so swapping to the real PTA domain later is one config
          // change with no code edit.
          html: `<div style="font-family:Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;color:#1a1a1a">` +
                `${esc(body).replace(/\n/g, '<br>')}${htmlFooter}</div>`,
        },
        // Metadata (ignored by the extension, kept for our own records):
        eventId, sentByUid: me.uid, sentByName: me.displayName, createdAt: serverTimestamp(),
      };
      if (me.email) mailDoc.to = [me.email]; // sender gets a copy; group stays BCC
      try {
        await addDoc(collection(db, 'mail'), mailDoc);
        // Accountability trail (Superadmin-visible audit log).
        try {
          await addDoc(collection(db, 'auditLog'), {
            actorUid: me.uid, actorName: me.displayName, action: 'event_email_sent',
            eventId, subject, recipientCount: emails.length, createdAt: serverTimestamp(),
          });
        } catch (e) { /* non-fatal */ }
        closeOverlay();
        toast(`Email queued to ${emails.length} ${emails.length === 1 ? 'person' : 'people'}.`);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Send email';
        toast('Could not send: ' + e.message);
      }
    };
  };
}

async function loadCoAdminPicker() {
  const { getDocs, collection: col } = await import("./js/firebase-init.js");
  const snap = await getDocs(col(db, 'users'));
  const eligible = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
    .filter(u => (u.isAdmin || u.isStoreAdmin || u.isSuperadmin) && !(ev.adminUids || []).includes(u.uid));
  const wrap = document.getElementById('addCoAdminWrap');
  if (!wrap) return;
  wrap.innerHTML = eligible.length
    ? `<select id="coAdminSelect">${eligible.map(u => `<option value="${u.uid}">${esc(u.displayName)}</option>`).join('')}</select>
       <button class="btn btn-ghost" id="addCoAdminBtn" style="margin-left:6px">Add</button>`
    : `<p style="color:var(--ink-soft);font-size:12.5px">No eligible Admin/Store Admin users to add yet.</p>`;
  const btn = document.getElementById('addCoAdminBtn');
  if (btn) btn.onclick = async () => {
    const uid = document.getElementById('coAdminSelect').value;
    try { await updateDoc(doc(db, 'events', eventId), { adminUids: arrayUnion(uid) }); toast('Co-admin added.'); }
    catch (e) { toast('Could not add: ' + e.message); }
  };
}
</script>
</body>
